<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA – Le Goût du Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--vert:#2d5a3d;--vc:#4a7c59;--vp:#e8f0e9;--bg:#f2f5f2;--bgd:#e0e8e0;--tx:#1a1a1a;--txl:#6b7c6b;--wh:#fff;--noir:#0d0d0d}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}

/* LOGIN */
#pLogin{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--noir);
  background-image:radial-gradient(ellipse at 20% 50%,rgba(45,90,61,.35) 0%,transparent 60%);
  z-index:100;padding:20px;
}
.lcard{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.licon{width:64px;height:64px;margin:0 auto 20px;background:linear-gradient(135deg,var(--vert),var(--vc));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 40px rgba(45,90,61,.4)}
.ltit{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:#fff;letter-spacing:2px;margin-bottom:4px}
.ltag{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:36px;letter-spacing:.5px}
.finput{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:#fff;outline:none;margin-bottom:12px;transition:border-color .2s}
.finput::placeholder{color:rgba(255,255,255,.25)}
.finput:focus{border-color:rgba(45,90,61,.7)}
.fbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--vert),var(--vc));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s}
.fbtn:hover{opacity:.9}
.ferr{color:#ff7070;font-size:13px;margin-top:10px;display:none}

/* APP */
#pApp{display:none;flex-direction:column;height:100%}

/* Header */
.topbar{background:var(--noir);height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px}
.orb{width:34px;height:34px;background:linear-gradient(135deg,var(--vert),var(--vc));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:#fff;letter-spacing:1px}
.brand-status{font-size:11px;color:rgba(255,255,255,.3);margin-left:4px}
.tbtn{padding:6px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:7px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;font-family:'DM Sans',sans-serif}
.tbtn:hover{background:rgba(255,255,255,.14);color:#fff}

/* Loading */
#loadDiv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:40px;height:40px;border:3px solid var(--bgd);border-top-color:var(--vert);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loadtxt{font-size:14px;color:var(--txl)}

/* Messages zone */
#chatDiv{flex:1;display:none;flex-direction:column;min-height:0}
.msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--bgd);border-radius:2px}

/* Messages */
.msg{display:flex;gap:10px;align-items:flex-end;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.bot .av{background:linear-gradient(135deg,var(--vert),var(--vc))}
.msg.user .av{background:var(--bgd);color:var(--txl)}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.65;max-width:72%}
.msg.bot .bubble{background:var(--wh);border:1px solid rgba(45,90,61,.08);border-bottom-left-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.msg.user .bubble{background:var(--vert);color:#fff;border-bottom-right-radius:4px}
.bubble strong{font-weight:600;color:var(--vert)}
.msg.user .bubble strong{color:#c8e6c9}
.bubble ul{padding-left:16px;margin:5px 0}
.bubble li{margin-bottom:3px}

/* Typing */
.typing{display:flex;gap:4px;padding:4px 2px}
.typing span{width:6px;height:6px;background:var(--bgd);border-radius:50%;animation:td .7s infinite}
.typing span:nth-child(2){animation-delay:.12s}
.typing span:nth-child(3){animation-delay:.24s}
@keyframes td{0%,60%,100%{transform:scale(1)}30%{transform:scale(1.4)}}

/* Bottom zone - TOUJOURS visible */
.bottom{flex-shrink:0;background:var(--wh);border-top:1px solid var(--bgd);padding:12px 20px 16px}
.sugs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.sug{padding:6px 12px;background:var(--bg);border:1.5px solid var(--bgd);border-radius:16px;font-size:12px;color:var(--vert);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.sug:hover{background:var(--vp);border-color:var(--vc)}
.inputrow{display:flex;gap:10px;align-items:center}
.msginput{flex:1;padding:11px 16px;border:1.5px solid var(--bgd);border-radius:24px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--bg);transition:all .2s;color:var(--tx)}
.msginput:focus{border-color:var(--vc);background:var(--wh)}
.msginput::placeholder{color:var(--txl)}
.sendbtn{width:42px;height:42px;background:linear-gradient(135deg,var(--vert),var(--vc));border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sendbtn:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 14px rgba(45,90,61,.3)}
.sendbtn:disabled{opacity:.4;cursor:not-allowed}
.sendbtn svg{fill:#fff;width:16px;height:16px;margin-left:2px}

@media(max-width:600px){
  .msgs{padding:16px}
  .bottom{padding:10px 14px 14px}
  .bubble{max-width:85%;font-size:13px}
  .topbar{padding:0 14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pLogin">
  <div class="lcard">
    <div class="licon">🌿</div>
    <div class="ltit">ARIA</div>
    <div class="ltag">Assistante · Le Goût du Lien</div>
    <input class="finput" type="password" id="iMdp" placeholder="Mot de passe">
    <button class="fbtn" onclick="login()">Accéder</button>
    <div class="ferr" id="ferr">Mot de passe incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="pApp">
  <div class="topbar">
    <div class="brand">
      <div class="orb">🌿</div>
      <span class="brand-name">ARIA</span>
      <span class="brand-status" id="statusTxt">· chargement...</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="tbtn" onclick="resetConv()">↺ Nouveau</button>
      <button class="tbtn" onclick="logout()">Quitter</button>
    </div>
  </div>

  <div id="loadDiv">
    <div class="spin"></div>
    <div class="loadtxt" id="loadTxt">Chargement des données...</div>
  </div>

  <div id="chatDiv">
    <div class="msgs" id="msgs"></div>
    <div class="bottom">
      <div class="sugs" id="sugs">
        <button class="sug" onclick="useSug(this)">📅 Commandes cette semaine</button>
        <button class="sug" onclick="useSug(this)">🍽️ Plats actifs</button>
        <button class="sug" onclick="useSug(this)">👷 Planning salariés</button>
        <button class="sug" onclick="useSug(this)">👥 Mes clients</button>
        <button class="sug" onclick="useSug(this)">📊 Résumé activité</button>
      </div>
      <div class="inputrow">
        <input class="msginput" type="text" id="msgInput" placeholder="Posez votre question à ARIA...">
        <button class="sendbtn" id="sendBtn" onclick="sendMsg()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const AK='patvhOGv8O9szhfm9.2b3cb31f20ecd6c0271669df216fa0224adc9b1e16c7f98ce6f5b14575a75905';
const BID='appTNygSM2x5VdNy6';
const AT=`https://api.airtable.com/v0/${BID}`;
const H={'Authorization':`Bearer ${AK}`,'Content-Type':'application/json'};
const PWD='legoutdulien2026';

let conv=[], sysPrompt='', busy=false;

// AUTH
function login(){
  if(document.getElementById('iMdp').value.trim()===PWD){
    document.getElementById('pLogin').style.display='none';
    document.getElementById('pApp').style.display='flex';
    sessionStorage.setItem('aria','1');
    charger();
  }else{
    document.getElementById('ferr').style.display='block';
  }
}
function logout(){sessionStorage.removeItem('aria');location.reload()}

document.getElementById('iMdp').addEventListener('keydown',e=>{if(e.key==='Enter')login()});

// AIRTABLE
async function fetchAll(tbl,sort=''){
  let recs=[],offset=null;
  do{
    const url=`${AT}/${tbl}?pageSize=100`+(sort?'&'+sort:'')+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:H});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    recs=[...recs,...(d.records||[])];
    offset=d.offset||null;
  }while(offset);
  return recs;
}

function getMonday(d){
  const dt=new Date(d),day=dt.getDay();
  const diff=dt.getDate()-day+(day===0?-6:1);
  const m=new Date(dt.setDate(diff));
  return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}

async function charger(){
  const setLoad=t=>document.getElementById('loadTxt').textContent=t;
  try{
    setLoad('Recettes...');
    const recettes=await fetchAll('Recettes','sort%5B0%5D%5Bfield%5D=Nom+du+plat&sort%5B0%5D%5Bdirection%5D=asc');
    setLoad('Ingrédients...');
    const [ings,ri]=await Promise.all([fetchAll('Ingr%C3%A9dients'),fetchAll('Recettes_Ingr%C3%A9dients','sort%5B0%5D%5Bfield%5D=Ordre&sort%5B0%5D%5Bdirection%5D=asc')]);
    setLoad('Commandes...');
    const [cmds,clients,salaries]=await Promise.all([
      fetchAll('Commandes','sort%5B0%5D%5Bfield%5D=Semaine+du&sort%5B0%5D%5Bdirection%5D=desc'),
      fetchAll('Clients'),fetchAll('Salari%C3%A9s')
    ]);

    const resolveNom=v=>{
      if(!v)return null;
      const val=Array.isArray(v)?v[0]:v;
      if(typeof val==='string'&&!val.startsWith('rec'))return val;
      return recettes.find(r=>r.id===val)?.fields['Nom du plat']||null;
    };

    const cmdFmt=cmds.map(c=>{
      const f=c.fields;
      return{client:f['Client']||'',semaine:f['Semaine du']||'',creneau:f['Créneau']||'',statut:f['Statut']||'',assigneA:f['Assigné à']||'',plats:[f['Plat 1'],f['Plat 2'],f['Plat 3'],f['Plat 4'],f['Plat 5']].map(resolveNom).filter(Boolean)};
    });

    const recFmt=recettes.map(r=>{
      const f=r.fields;
      const iRec=ri.filter(x=>(x.fields['Nom ligne']||'').startsWith(f['Nom du plat']||'')).map(x=>{
        const nl=x.fields['Nom ligne']||'';
        const nom=nl.includes(' - ')?nl.split(' - ').slice(1).join(' - '):'';
        const q=x.fields['Quantité par portion']||0;
        const uR=x.fields['Unité par défaut'];
        const u=Array.isArray(uR)?uR[0]:(uR||'');
        return`${nom}${q?` (${q}${u&&u!=='Unité par défaut'?' '+u:''})` :''}`;
      });
      return{nom:f['Nom du plat']||'',cat:f['Catégorie']||'',actif:!!f['Active ?'],frigo:f['Frigo en jours']||0,rechauffage:f['Instructions réchauffage']||'',conservation:f['Conservation']||'',congelation:f['Congélation']||'',ings:iRec};
    });

    const now=new Date();
    const semaine=getMonday(now);
    const cmdSem=cmdFmt.filter(c=>c.semaine.includes(semaine));
    const actifs=recFmt.filter(r=>r.actif);

    sysPrompt=`Tu es ARIA, assistante d'Alizée, gérante de "Le Goût du Lien" (batch cooking à domicile, 60€/sem, 5 plats, 4 portions). Réponds en français, de façon concise et utile. Utilise **gras** pour les infos clés. Comprends le langage naturel et informel.

AUJOURD'HUI: ${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
SEMAINE: ${semaine}

COMMANDES CETTE SEMAINE (${cmdSem.length}):
${cmdSem.map(c=>`- ${c.client} | ${c.creneau} | ${c.plats.join(', ')} | ${c.statut} | Assigné: ${c.assigneA||'–'}`).join('\n')||'Aucune'}

PLATS ACTIFS (${actifs.length}/${recFmt.length}):
${actifs.map(r=>`- ${r.nom} [${r.cat}]`).join('\n')}

TOUTES LES RECETTES:
${recFmt.map(r=>`• ${r.nom} [${r.cat}] ${r.actif?'✓':'✗'} Frigo:${r.frigo}j - Ingré/portion: ${r.ings.join(', ')||'–'} - Réchauffage: ${r.rechauffage||'–'} - Conservation: ${r.conservation||'–'} - Congélation: ${r.congelation||'–'}`).join('\n')}

CLIENTS (${clients.length}):
${clients.map(c=>`- ${c.fields['Nom']||''} | ${c.fields['E-mail']||''} | ${c.fields['Téléphone']||''} | ${c.fields['Adresse']||''}`).join('\n')}

SALARIÉS (${salaries.length}):
${salaries.map(s=>`- ${s.fields['Nom']||''} | ${s.fields['Email']||s.fields['E-mail']||''}`).join('\n')}

HISTORIQUE (30 dernières commandes):
${cmdFmt.slice(0,30).map(c=>`- ${c.semaine} | ${c.client} | ${c.creneau} | ${c.plats.join(', ')} | ${c.statut} | ${c.assigneA||'–'}`).join('\n')}`;

    document.getElementById('loadDiv').style.display='none';
    document.getElementById('chatDiv').style.display='flex';
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('statusTxt').textContent=`· ${actifs.length} plats actifs · ${cmdSem.length} commandes cette semaine`;

    addMsg('bot',`**Bonjour Alizée !** 🌿\n\nJ'ai chargé toutes vos données :\n• **${actifs.length} plats actifs** (${recFmt.length} total)\n• **${cmdSem.length} commandes** cette semaine\n• **${clients.length} clients** · **${salaries.length} salariés**\n\nPosez-moi n'importe quelle question !`);
  }catch(e){
    document.getElementById('loadTxt').textContent='Erreur: '+e.message;
  }
}

// CHAT
function addMsg(type,text){
  const div=document.getElementById('msgs');
  const m=document.createElement('div');
  m.className='msg '+type;
  const html=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  m.innerHTML=`<div class="av">${type==='bot'?'🌿':'👤'}</div><div class="bubble">${html}</div>`;
  div.appendChild(m);
  div.scrollTop=div.scrollHeight;
}

function addTyping(){
  const div=document.getElementById('msgs');
  const t=document.createElement('div');
  t.className='msg bot';t.id='typing';
  t.innerHTML='<div class="av">🌿</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  div.appendChild(t);
  div.scrollTop=div.scrollHeight;
}
function removeTyping(){document.getElementById('typing')?.remove()}

function scrollBottom(){
  const d=document.getElementById('msgs');
  d.scrollTop=d.scrollHeight;
}

function useSug(btn){
  document.getElementById('msgInput').value=btn.textContent.replace(/^.\s/,'');
  sendMsg();
}

async function sendMsg(){
  const inp=document.getElementById('msgInput');
  const msg=inp.value.trim();
  if(!msg||busy)return;
  inp.value='';
  busy=true;
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',msg);
  conv.push({role:'user',content:msg});
  addTyping();
  try{
    const r=await fetch('/.netlify/functions/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sysPrompt,messages:conv})
    });
    const d=await r.json();
    removeTyping();
    const reply=d.content?.[0]?.text||(d.error?'Erreur API: '+d.error.message:'Pas de réponse.');
    addMsg('bot',reply);
    conv.push({role:'assistant',content:reply});
    if(conv.length>20)conv=conv.slice(-20);
  }catch(e){
    removeTyping();
    addMsg('bot','Erreur de connexion.');
  }
  busy=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('msgInput').focus();
  scrollBottom();
}

function resetConv(){
  conv=[];
  document.getElementById('msgs').innerHTML='';
  addMsg('bot','Conversation réinitialisée. Comment puis-je vous aider ?');
}

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});

if(sessionStorage.getItem('aria')==='1'){
  document.getElementById('pLogin').style.display='none';
  document.getElementById('pApp').style.display='flex';
  charger();
}
</script>
</body>
</html>
