<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA – Assistant Le Goût du Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#0d0d0d;--blanc:#fafaf7;--vert:#2d5a3d;--vc:#4a7c59;--vp:#e8f0e9;--vl:#c8dcc8;
  --gris:#8a8a7a;--grisl:#f0efe8;--sh:0 8px 40px rgba(0,0,0,.12);
  --r:20px;--gold:#b8964e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--blanc);color:var(--noir);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
#pLogin{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--noir);
  background-image:radial-gradient(ellipse at 20% 50%, rgba(45,90,61,.4) 0%, transparent 60%),
                   radial-gradient(ellipse at 80% 20%, rgba(184,150,78,.15) 0%, transparent 50%);
  padding:20px;
}
.lcard{
  background:rgba(250,250,247,.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(250,250,247,.1);
  border-radius:28px;padding:56px 44px;width:100%;max-width:420px;
  text-align:center;
}
.licon{
  width:72px;height:72px;margin:0 auto 24px;
  background:linear-gradient(135deg,var(--vert),var(--vc));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:30px;box-shadow:0 0 40px rgba(45,90,61,.4);
}
.ltit{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--blanc);letter-spacing:1px;margin-bottom:6px}
.ltag{font-size:13px;color:rgba(250,250,247,.4);margin-bottom:40px;letter-spacing:.5px}
.fg{margin-bottom:16px;text-align:left}
.fg label{display:block;font-size:11px;font-weight:500;color:rgba(250,250,247,.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.fg input{
  width:100%;padding:14px 18px;
  background:rgba(250,250,247,.06);
  border:1px solid rgba(250,250,247,.1);
  border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;
  color:var(--blanc);outline:none;transition:all .2s;
}
.fg input::placeholder{color:rgba(250,250,247,.2)}
.fg input:focus{border-color:rgba(45,90,61,.6);background:rgba(250,250,247,.08)}
.btnLogin{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--vert),var(--vc));
  color:#fff;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;margin-top:8px;letter-spacing:.3px;
  transition:all .2s;box-shadow:0 4px 20px rgba(45,90,61,.3);
}
.btnLogin:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(45,90,61,.4)}
.lerr{background:rgba(198,40,40,.15);border:1px solid rgba(198,40,40,.3);color:#ff6b6b;padding:11px;border-radius:10px;font-size:13px;margin-top:12px;display:none}

/* CHAT */
#pChat{flex:1;display:none;flex-direction:column;background:var(--blanc)}

.chat-topbar{
  background:var(--noir);
  padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.aria-brand{display:flex;align-items:center;gap:14px}
.aria-orb{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--vert),var(--vc));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  position:relative;
}
.aria-orb::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:1px solid rgba(45,90,61,.4);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
.aria-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--blanc);letter-spacing:1px}
.aria-status{font-size:11px;color:rgba(250,250,247,.35);letter-spacing:.5px}
.topbar-actions{display:flex;gap:8px}
.tbtn{
  padding:7px 14px;background:rgba(250,250,247,.08);
  border:1px solid rgba(250,250,247,.1);border-radius:8px;
  font-size:12px;color:rgba(250,250,247,.6);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.tbtn:hover{background:rgba(250,250,247,.14);color:var(--blanc)}

/* Loading state */
#loadingState{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:var(--blanc);
}
.loader-orb{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--vert),var(--vc));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  animation:float 2s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.loader-txt{font-size:14px;color:var(--gris);font-weight:300}
.loader-step{font-size:12px;color:var(--vl);margin-top:-8px}
.loader-bar{width:200px;height:3px;background:var(--grisl);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--vert),var(--vc));border-radius:2px;animation:fill 3s ease-out forwards}
@keyframes fill{from{width:0}to{width:90%}}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:18px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--vl);border-radius:2px}

.msg{display:flex;gap:12px;align-items:flex-start;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--vert),var(--vc));color:#fff}
.msg.user .msg-av{background:var(--grisl);color:var(--gris)}
.msg-bub{
  max-width:75%;padding:13px 17px;border-radius:18px;
  font-size:14px;line-height:1.7;
}
.msg.bot .msg-bub{
  background:var(--blanc);border:1px solid rgba(0,0,0,.06);
  border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.msg.user .msg-bub{
  background:var(--noir);color:var(--blanc);
  border-bottom-right-radius:4px;
}
.msg-bub strong{color:var(--vert);font-weight:600}
.msg-bub ul{padding-left:18px;margin:6px 0}
.msg-bub li{margin-bottom:4px}
.msg-bub .chip{display:inline-block;background:var(--vp);color:var(--vert);padding:2px 9px;border-radius:12px;font-size:12px;font-weight:500;margin:2px 2px}

/* Typing */
.typing-dots{display:flex;gap:5px;align-items:center;padding:4px 2px}
.typing-dots span{width:6px;height:6px;background:var(--vl);border-radius:50%;animation:td .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:scale(1);opacity:.5}30%{transform:scale(1.3);opacity:1}}

/* Suggestions */
.sugs{padding:0 28px 14px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.sug{
  padding:8px 14px;background:var(--blanc);
  border:1.5px solid rgba(45,90,61,.2);border-radius:20px;
  font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;
  color:var(--vert);transition:all .2s;
}
.sug:hover{background:var(--vp);border-color:var(--vc)}

/* Input */
.input-wrap{
  padding:16px 28px 20px;
  background:var(--blanc);border-top:1px solid rgba(0,0,0,.06);
  flex-shrink:0;
}
.input-inner{
  display:flex;gap:10px;align-items:center;
  background:var(--grisl);border-radius:28px;padding:6px 6px 6px 20px;
  border:1.5px solid transparent;transition:border-color .2s;
}
.input-inner:focus-within{border-color:rgba(45,90,61,.3);background:var(--blanc)}
.input-inner input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--noir);padding:6px 0;
}
.input-inner input::placeholder{color:var(--gris)}
.send-btn{
  width:40px;height:40px;background:linear-gradient(135deg,var(--vert),var(--vc));
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px rgba(45,90,61,.3)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{fill:#fff;width:16px;height:16px;margin-left:2px}

/* Data badge */
.data-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--vp);border-radius:8px;padding:6px 12px;
  font-size:11px;color:var(--vert);margin-bottom:14px;
  border:1px solid rgba(45,90,61,.1);
}
.db-dot{width:6px;height:6px;background:var(--vc);border-radius:50%}

@media(max-width:600px){
  .chat-topbar{padding:0 16px}
  .messages{padding:16px}
  .sugs{padding:0 16px 10px}
  .input-wrap{padding:12px 16px 16px}
  .msg-bub{max-width:88%;font-size:13px}
  .aria-name{font-size:17px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pLogin">
  <div class="lcard">
    <div class="licon">🌿</div>
    <div class="ltit">ARIA</div>
    <div class="ltag">Assistant Intelligence · Le Goût du Lien</div>
    <div class="fg"><label>Mot de passe</label><input type="password" id="iMdp" placeholder="••••••••"></div>
    <button class="btnLogin" onclick="login()">Accéder à ARIA</button>
    <div class="lerr" id="lerr">Mot de passe incorrect.</div>
  </div>
</div>

<!-- CHAT -->
<div id="pChat">
  <div class="chat-topbar">
    <div class="aria-brand">
      <div class="aria-orb">🌿</div>
      <div>
        <div class="aria-name">ARIA</div>
        <div class="aria-status" id="statusTxt">Initialisation...</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="tbtn" onclick="resetConv()">↺ Nouvelle conversation</button>
      <button class="tbtn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div id="loadingState">
    <div class="loader-orb">🌿</div>
    <div class="loader-txt">ARIA charge vos données...</div>
    <div class="loader-step" id="loadStep">Connexion à Airtable</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <div class="messages" id="messages" style="display:none"></div>

  <div class="sugs" id="sugs" style="display:none">
    <button class="sug" onclick="useSug(this)">📅 Commandes cette semaine ?</button>
    <button class="sug" onclick="useSug(this)">🍽️ Quels plats sont actifs ?</button>
    <button class="sug" onclick="useSug(this)">👷 Qui travaille cette semaine ?</button>
    <button class="sug" onclick="useSug(this)">👥 Liste de mes clients</button>
    <button class="sug" onclick="useSug(this)">🥕 Ingrédients du Risotto Champignons</button>
    <button class="sug" onclick="useSug(this)">📊 Résumé de mon activité</button>
  </div>

  <div class="input-wrap" id="inputWrap" style="display:none">
    <div class="input-inner">
      <input type="text" id="msgInput" placeholder="Posez votre question à ARIA...">
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const AK='patvhOGv8O9szhfm9.2b3cb31f20ecd6c0271669df216fa0224adc9b1e16c7f98ce6f5b14575a75905';
const BID='appTNygSM2x5VdNy6';
const AT=`https://api.airtable.com/v0/${BID}`;
const H={'Authorization':`Bearer ${AK}`,'Content-Type':'application/json'};
const PWD='legoutdulien2026';

let conv=[], sysPrompt='', isLoading=false;

// ===== AUTH =====
function login(){
  const mdp=document.getElementById('iMdp').value.trim();
  if(mdp===PWD){
    sessionStorage.setItem('aria','1');
    document.getElementById('pLogin').style.display='none';
    document.getElementById('pChat').style.display='flex';
    chargerDonnees();
  }else{
    const err=document.getElementById('lerr');
    err.style.display='block';
    err.textContent='Mot de passe incorrect.';
  }
}
function logout(){sessionStorage.removeItem('aria');location.reload()}

// ===== AIRTABLE =====
async function fetchAll(tbl,sort=''){
  let recs=[],offset=null;
  do{
    const url=`${AT}/${tbl}?pageSize=100`+(sort?'&'+sort:'')+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:H});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    recs=[...recs,...(d.records||[])];
    offset=d.offset||null;
  }while(offset);
  return recs;
}

function setStep(txt){document.getElementById('loadStep').textContent=txt}
function getMonday(d){
  const date=new Date(d),day=date.getDay();
  const diff=date.getDate()-day+(day===0?-6:1);
  const mon=new Date(date.setDate(diff));
  return`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}

async function chargerDonnees(){
  try{
    setStep('Chargement des recettes...');
    const recettes=await fetchAll('Recettes','sort%5B0%5D%5Bfield%5D=Nom+du+plat&sort%5B0%5D%5Bdirection%5D=asc');

    setStep('Chargement des ingrédients...');
    const [ingredients,ri]=await Promise.all([
      fetchAll('Ingr%C3%A9dients'),
      fetchAll('Recettes_Ingr%C3%A9dients','sort%5B0%5D%5Bfield%5D=Ordre&sort%5B0%5D%5Bdirection%5D=asc')
    ]);

    setStep('Chargement des commandes...');
    const [commandes,clients,salaries]=await Promise.all([
      fetchAll('Commandes','sort%5B0%5D%5Bfield%5D=Semaine+du&sort%5B0%5D%5Bdirection%5D=desc'),
      fetchAll('Clients'),
      fetchAll('Salari%C3%A9s')
    ]);

    setStep('Construction du contexte...');

    // Résolution plats
    const resoudreNom=val=>{
      if(!val)return null;
      const v=Array.isArray(val)?val[0]:val;
      if(typeof v==='string'&&!v.startsWith('rec'))return v;
      return recettes.find(r=>r.id===v)?.fields['Nom du plat']||null;
    };

    const cmdFmt=commandes.map(c=>{
      const f=c.fields;
      return{
        client:f['Client']||'',semaine:f['Semaine du']||'',
        creneau:f['Créneau']||'',statut:f['Statut']||'',
        assigneA:f['Assigné à']||'',
        plats:[f['Plat 1'],f['Plat 2'],f['Plat 3'],f['Plat 4'],f['Plat 5']].map(resoudreNom).filter(Boolean)
      };
    });

    const recFmt=recettes.map(rec=>{
      const f=rec.fields;
      const ings=ri.filter(r=>(r.fields['Nom ligne']||'').startsWith(f['Nom du plat']||'')).map(r=>{
        const nl=r.fields['Nom ligne']||'';
        const nom=nl.includes(' - ')?nl.split(' - ').slice(1).join(' - '):'';
        const qte=r.fields['Quantité par portion']||0;
        const uRaw=r.fields['Unité par défaut'];
        const u=Array.isArray(uRaw)?uRaw[0]:(uRaw||'');
        return`${nom}${qte?` (${qte}${u&&u!=='Unité par défaut'?' '+u:''})` :''}`;
      });
      return{
        nom:f['Nom du plat']||'',cat:f['Catégorie']||'',actif:!!f['Active ?'],
        frigo:f['Frigo en jours']||0,
        rechauffage:f['Instructions réchauffage']||'',
        conservation:f['Conservation']||'',
        congelation:f['Congélation']||'',
        ings
      };
    });

    const now=new Date();
    const semCourante=getMonday(now);
    const cmdSemaine=cmdFmt.filter(c=>c.semaine.includes(semCourante));
    const platsActifs=recFmt.filter(r=>r.actif);

    sysPrompt=`Tu es ARIA, l'assistante intelligente personnelle d'Alizée, gérante de "Le Goût du Lien", un service de batch cooking à domicile en France.

Tu comprends les formulations naturelles et informelles en français. Si on te dit "c'est quoi les ingré du risotto" tu comprends qu'on parle des ingrédients du Risotto. Tu réponds de façon concise, chaleureuse et utile. Tu utilises **gras** pour les infos clés. Tu peux utiliser des listes quand c'est pertinent.

CONTEXTE ACTIVITÉ:
- Service de batch cooking à domicile, 60€/semaine, 5 plats par commande, 4 portions chacun
- Créneaux: Lundi/Mardi/Jeudi/Vendredi 9h-12h et 13h-16h
- Maximum 12 clients par semaine

═══ DONNÉES EN TEMPS RÉEL ═══

📅 AUJOURD'HUI: ${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
SEMAINE COURANTE: ${semCourante}

COMMANDES CETTE SEMAINE (${cmdSemaine.length}):
${cmdSemaine.map(c=>`▸ ${c.client} · ${c.creneau} · Plats: ${c.plats.join(', ')} · Statut: ${c.statut} · Assigné: ${c.assigneA||'Non assigné'}`).join('\n')||'Aucune commande cette semaine'}

🍽️ MENU ACTUEL - PLATS ACTIFS (${platsActifs.length}/${recFmt.length}):
${platsActifs.map(r=>`▸ ${r.nom} [${r.cat}]`).join('\n')}

📚 TOUTES LES RECETTES DÉTAILLÉES:
${recFmt.map(r=>`
▸ ${r.nom} [${r.cat}] ${r.actif?'✓ ACTIF':'✗ INACTIF'}
  Frigo: ${r.frigo} jours · Ingrédients/portion: ${r.ings.join(', ')||'non renseignés'}
  Réchauffage: ${r.rechauffage||'non renseigné'}
  Conservation: ${r.conservation||'non renseignée'}
  Congélation: ${r.congelation||'non renseignée'}`).join('\n')}

👥 CLIENTS (${clients.length}):
${clients.map(c=>`▸ ${c.fields['Nom']||''} · ${c.fields['E-mail']||''} · ${c.fields['Téléphone']||''} · ${c.fields['Adresse']||''}`).join('\n')}

👷 SALARIÉS (${salaries.length}):
${salaries.map(s=>`▸ ${s.fields['Nom']||''} · ${s.fields['Email']||s.fields['E-mail']||''}`).join('\n')}

📋 HISTORIQUE COMMANDES (30 dernières):
${cmdFmt.slice(0,30).map(c=>`▸ ${c.semaine} · ${c.client} · ${c.creneau} · ${c.plats.join(', ')} · ${c.statut} · Assigné: ${c.assigneA||'–'}`).join('\n')}

🥕 CATALOGUE INGRÉDIENTS (${ingredients.length}):
${ingredients.map(i=>`${i.fields['Nom ingrédient']||''} (${i.fields['Rayon']||''})`).join(' · ')}

Réponds toujours en français. Sois précise, utile et concise.`;

    // Afficher l'interface
    document.getElementById('loadingState').style.display='none';
    document.getElementById('messages').style.display='flex';
    document.getElementById('sugs').style.display='flex';
    document.getElementById('inputWrap').style.display='block';
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('statusTxt').textContent=`En ligne · ${platsActifs.length} plats actifs · ${cmdSemaine.length} commandes cette semaine`;

    // Message de bienvenue
    const heure=now.getHours();
    const salut=heure<12?'Bonjour':heure<18?'Bonjour':'Bonsoir';
    addMsg('bot',`**Bonjour Alizée !** 🌿\n\nJe suis ARIA, votre assistante Le Goût du Lien. J'ai chargé toutes vos données en temps réel :\n\n• **${platsActifs.length} plats actifs** au menu (${recFmt.length} au total)\n• **${cmdSemaine.length} commandes** pour cette semaine\n• **${clients.length} clients** · **${salaries.length} salariés**\n\nPosez-moi n'importe quelle question sur votre activité, je comprends le langage naturel !`);

  }catch(e){
    document.getElementById('loadStep').textContent='Erreur: '+e.message;
    document.getElementById('loadStep').style.color='#ff6b6b';
  }
}

// ===== CHAT =====
function addMsg(type,text){
  const div=document.getElementById('messages');
  const msg=document.createElement('div');
  msg.className=`msg ${type}`;
  const av=type==='bot'?'🌿':'👤';
  const html=text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  msg.innerHTML=`<div class="msg-av">${av}</div><div class="msg-bub">${html}</div>`;
  div.appendChild(msg);
  div.scrollTop=div.scrollHeight;
}

function addTyping(){
  const div=document.getElementById('messages');
  const t=document.createElement('div');
  t.className='msg bot';t.id='typing';
  t.innerHTML=`<div class="msg-av">🌿</div><div class="msg-bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  div.appendChild(t);div.scrollTop=div.scrollHeight;
}
function removeTyping(){document.getElementById('typing')?.remove()}

function useSug(btn){
  document.getElementById('msgInput').value=btn.textContent.replace(/^[^\s]+\s/,'');
  sendMsg();
}

async function sendMsg(){
  const input=document.getElementById('msgInput');
  const msg=input.value.trim();
  if(!msg||isLoading)return;
  input.value='';
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('sugs').style.display='none';
  addMsg('user',msg);
  conv.push({role:'user',content:msg});
  addTyping();

  try{
    const r=await fetch('/.netlify/functions/claude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:sysPrompt,
        messages:conv
      })
    });
    const d=await r.json();
    const reply=d.content?.[0]?.text||'Désolé, je n\'ai pas pu répondre.';
    removeTyping();
    addMsg('bot',reply);
    conv.push({role:'assistant',content:reply});
    if(conv.length>20)conv=conv.slice(-20);
  }catch(e){
    removeTyping();
    addMsg('bot','Connexion impossible à l\'assistant. Vérifiez votre déploiement.');
  }
  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
}

function resetConv(){
  conv=[];
  document.getElementById('messages').innerHTML='';
  document.getElementById('sugs').style.display='flex';
  addMsg('bot','Conversation réinitialisée. Comment puis-je vous aider ?');
}

document.getElementById('iMdp').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
document.getElementById('msgInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('aria')==='1'){
    document.getElementById('pLogin').style.display='none';
    document.getElementById('pChat').style.display='flex';
    chargerDonnees();
  }
});
</script>
</body>
</html>
