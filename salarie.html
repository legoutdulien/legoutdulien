<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Goût du Lien – Mon planning</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dgoqyp3wn/image/upload/v1774719838/ChatGPT_Image_28_mars_2026_18_37_48_u200aw.png">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dgoqyp3wn/image/upload/v1774719838/ChatGPT_Image_28_mars_2026_18_37_48_u200aw.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Le Goût du Lien · Salarié">
<meta name="theme-color" content="#2d5a3d">
<link rel="manifest" href="/manifest-salarie.json">
<style>
:root{--vert:#3d6b4f;--vc:#5a8a6a;--vp:#eef4f0;--bg:#f8f4ee;--bgd:#ede7db;--tx:#2c2c2c;--txl:#6b6b6b;--wh:#fff;--sh:0 4px 24px rgba(0,0,0,.08);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:var(--vert);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#fff}
.logo span{font-size:12px;font-weight:400;opacity:.7;display:block;margin-top:-2px}
.hbtn{padding:7px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
#pLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg),var(--vp));padding:20px}
.lcard{background:var(--wh);border-radius:24px;padding:44px 36px;width:100%;max-width:400px;box-shadow:var(--sh);text-align:center}
.llogo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--vert);margin-bottom:4px}
.ltag{font-size:13px;color:var(--txl);margin-bottom:28px}
.fg{margin-bottom:14px;text-align:left}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--txl);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:12px 15px;border:1.5px solid var(--bgd);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg);outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--vert);background:var(--wh)}
.btnLogin{width:100%;padding:13px;background:var(--vert);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.btnLogin:hover{background:var(--vc)}
.lerr{background:#fdecea;color:#c62828;padding:10px;border-radius:9px;font-size:13px;margin-top:10px;display:none}
#pSalarie{display:none}
.main{padding:28px 24px;max-width:800px;margin:0 auto}
.welcome{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:6px}
.welcome-sub{font-size:14px;color:var(--txl);margin-bottom:28px}
.sem-nav{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.sem-select{padding:9px 14px;border:1.5px solid var(--bgd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--wh);color:var(--tx);cursor:pointer;outline:none}
.sem-select:focus{border-color:var(--vert)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--wh);border-radius:var(--r);padding:16px;box-shadow:var(--sh);text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--vert)}
.stat-lbl{font-size:12px;color:var(--txl);margin-top:3px}
.stit{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin-bottom:14px}
.mission-card{background:var(--wh);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:14px;border-left:4px solid var(--vert)}
.mission-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.mission-date{font-size:13px;font-weight:600;color:var(--vert);margin-bottom:2px}
.mission-creneau{font-size:14px;font-weight:600}
.client-info{background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.client-nom{font-size:15px;font-weight:600;margin-bottom:6px}
.client-detail{font-size:13px;color:var(--txl);display:flex;align-items:center;gap:6px;margin-bottom:3px}
.plats-section{margin-top:12px}
.plat-item{background:var(--bg);border-radius:10px;margin-bottom:8px;overflow:hidden}
.plat-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:14px;user-select:none}
.plat-header:hover{background:var(--bgd)}
.plat-arrow{transition:transform .2s;font-size:12px}
.plat-ings{display:none;padding:0 14px 12px}
.plat-ings.open{display:block}
.ing-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bgd);font-size:13px}
.ing-line:last-child{border-bottom:none}
.ing-qte{color:var(--txl);font-size:12px}
.empty{text-align:center;padding:48px;color:var(--txl)}
.empty-icon{font-size:48px;margin-bottom:12px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.show{display:flex}
.mbox{background:var(--wh);border-radius:20px;max-width:460px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:24px}
.mclose{width:100%;padding:12px;background:var(--bgd);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:14px}
.cal-semaine{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px}
.cal-jour{background:var(--wh);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.cal-jour-header{background:var(--vert);color:#fff;padding:8px 10px;font-size:12px;font-weight:600}
.cal-jour-header span{font-size:10px;opacity:.7;display:block}
.cal-slot{padding:7px 9px;border-bottom:1px solid var(--bgd);font-size:11px}
.cal-slot:last-child{border-bottom:none}
.cal-slot-heure{font-weight:600;color:var(--vert);font-size:10px;margin-bottom:1px}
.cal-slot.moi{background:var(--vp);cursor:pointer}
.cal-slot.vide{color:var(--txl);font-style:italic}
.cal-mois{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cmh{text-align:center;font-size:10px;font-weight:600;color:var(--txl);text-transform:uppercase;padding:4px 0}
.cmd{background:var(--wh);border-radius:6px;min-height:60px;padding:4px;box-shadow:var(--sh)}
.cmd.autre{opacity:.3}
.cmd.today{border:2px solid var(--vert)}
.cmd-num{font-size:11px;font-weight:600;margin-bottom:2px}
.cmd-ev{font-size:9px;background:var(--vp);color:var(--vert);border-radius:3px;padding:1px 4px;margin-bottom:1px}
.lov{position:fixed;inset:0;background:rgba(255,255,255,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spin{width:34px;height:34px;border:3px solid var(--bgd);border-top-color:var(--vert);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:14px;color:var(--txl)}
@media(max-width:640px){
  header{padding:0 14px;height:54px}
  .logo img{height:30px}
  .hbtn{padding:6px 10px;font-size:12px}
  .main{padding:16px 14px 60px}
  .welcome{font-size:20px}
  .stats-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:12px}
  .stat-num{font-size:22px}
  #btnListe,#btnSem,#btnMois{padding:8px 14px;font-size:12px}
  .mission-card{padding:16px}
  .mission-header{flex-direction:column;gap:8px}
  .mission-creneau{font-size:13px}
  .client-nom{font-size:14px}
  .client-detail{font-size:12px}
  .cal-semaine{grid-template-columns:repeat(5,minmax(120px,1fr));overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cal-mois{gap:2px}
  .cmd{min-height:48px;padding:3px}
  .cmd-num{font-size:10px}
  .cmd-ev{font-size:8px;padding:1px 3px}
  .sem-select{width:100%;font-size:13px}
  .mbox{border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%}
  .mbg{align-items:flex-end;padding:0}
}
@media(max-width:380px){
  .stats-row{grid-template-columns:1fr}
  #btnListe,#btnSem,#btnMois{padding:7px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spin"></div><div class="ltxt">Chargement...</div></div>

<!-- LOGIN -->
<div id="pLogin">
  <div class="lcard">
    <img src="https://res.cloudinary.com/dgoqyp3wn/image/upload/v1774719838/ChatGPT_Image_28_mars_2026_18_37_48_u200aw.png" alt="Le Gout du Lien" style="height:70px;width:auto;object-fit:contain;display:block;margin:0 auto 12px">
    <div class="ltag">Espace salarie - Mon planning</div>
    <div class="fg"><label>Email</label><input type="email" id="iEmail" placeholder="votre adresse"></div>
    <div class="fg"><label>Mot de passe</label><input type="password" id="iMdp" placeholder="••••••••"></div>
    <button class="btnLogin" id="btnLogin">Acceder a mon planning</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- PLANNING -->
<div id="pSalarie">
  <header>
    <div class="logo"><img src="https://res.cloudinary.com/dgoqyp3wn/image/upload/v1774719838/ChatGPT_Image_28_mars_2026_18_37_48_u200aw.png" alt="Le Gout du Lien" style="height:34px;width:auto;object-fit:contain;display:block"></div>
    <button class="hbtn" id="btnLogout">Deconnexion</button>
  </header>
  <div class="main">
    <div class="welcome" id="welcomeTxt">Bonjour !</div>
    <div class="welcome-sub">Voici vos missions de la semaine</div>
    <div class="sem-nav">
      <select class="sem-select" id="semSelect"></select>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <button id="btnListe" style="padding:9px 18px;background:var(--vert);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Liste</button>
      <button id="btnSem" style="padding:9px 18px;background:var(--bgd);color:var(--tx);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Semaine</button>
      <button id="btnMois" style="padding:9px 18px;background:var(--bgd);color:var(--tx);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Mois</button>
    </div>
    <div id="calSemDiv" style="display:none;margin-bottom:20px">
      <select class="sem-select" id="calSemSelect"></select>
    </div>
    <div id="calMoisDiv" style="display:none;margin-bottom:20px">
      <select class="sem-select" id="calMoisSelect"></select>
    </div>
    <div id="calContainer" style="display:none"></div>
    <div class="stit" id="listeTitre">Mes missions</div>
    <div id="missionsDiv"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="salarie.js"></script>
</body>
</html>
