<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Goût du Lien – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--vert:#3d6b4f;--vc:#5a8a6a;--vp:#eef4f0;--bg:#f8f4ee;--bgd:#ede7db;--tx:#2c2c2c;--txl:#6b6b6b;--wh:#fff;--sh:0 4px 24px rgba(0,0,0,.08);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:var(--vert);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff}
.logo span{font-size:12px;font-weight:400;opacity:.7;display:block;margin-top:-2px}
.hbtn{padding:7px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
.hbtn:hover{background:rgba(255,255,255,.25)}
#pLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg),var(--vp));padding:20px}
.lcard{background:var(--wh);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--sh);text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--vert);margin-bottom:4px}
.ltag{font-size:13px;color:var(--txl);margin-bottom:32px}
.fg{margin-bottom:16px;text-align:left}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--txl);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:13px 16px;border:1.5px solid var(--bgd);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg);outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--vert);background:var(--wh)}
.btnLogin{width:100%;padding:14px;background:var(--vert);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer}
.btnLogin:hover{background:var(--vc)}
.lerr{background:#fdecea;color:#c62828;padding:11px;border-radius:9px;font-size:13px;margin-top:12px;display:none}
#pAdmin{display:none}
.main{padding:32px;max-width:1200px;margin:0 auto}
.nav-tabs{display:flex;gap:6px;margin-bottom:28px;background:var(--wh);border-radius:12px;padding:5px;box-shadow:var(--sh);width:fit-content}
.ntab{padding:10px 20px;border:none;background:transparent;cursor:pointer;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--txl);transition:all .2s}
.ntab.on{background:var(--vert);color:#fff}
.npage{display:none}.npage.on{display:block}
.sem-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.sem-nav label{font-size:13px;color:var(--txl);font-weight:500}
.sem-select{padding:9px 14px;border:1.5px solid var(--bgd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--wh);color:var(--tx);cursor:pointer;outline:none}
.sem-select:focus{border-color:var(--vert)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--wh);border-radius:var(--r);padding:18px;box-shadow:var(--sh);text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--vert)}
.stat-lbl{font-size:12px;color:var(--txl);margin-top:4px}
.stit{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:16px}
/* Commandes avec assignation */
.cmd-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
.cmd-card{background:var(--wh);border-radius:var(--r);padding:20px 24px;box-shadow:var(--sh)}
.cmd-card-top{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:start;margin-bottom:14px}
.cmd-label{font-size:11px;color:var(--txl);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.cmd-val{font-size:14px;font-weight:500}
.cmd-val.small{font-size:13px;color:var(--txl);font-weight:400}
.cmd-plats-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ptag{font-size:11px;background:var(--vp);color:var(--vert);padding:3px 9px;border-radius:10px;cursor:pointer;transition:background .15s}
.ptag:hover{background:#c8e6c9}
.assign-row{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--bgd)}
.assign-label{font-size:13px;color:var(--txl)}
.assign-select{padding:8px 12px;border:1.5px solid var(--bgd);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--wh);color:var(--tx);cursor:pointer;outline:none;flex:1;max-width:200px}
.assign-select:focus{border-color:var(--vert)}
.btn-assign{padding:8px 16px;background:var(--vert);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-assign:hover{background:var(--vc)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge.ok{background:#e8f5e9;color:#2e7d32}
.badge.wait{background:#fff3e0;color:#e65100}
/* Modal ingrédients */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.show{display:flex}
.mbox{background:var(--wh);border-radius:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mbody{padding:24px}
.mtit{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:16px}
.ing-list{list-style:none}
.ing-list li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bgd);font-size:14px}
.ing-list li:last-child{border-bottom:none}
.ing-qte{color:var(--txl);font-size:13px}
.mclose{width:100%;padding:12px;background:var(--bgd);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:16px}
/* Plats */
.plats-admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.plat-admin-card{background:var(--wh);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .2s}
.plat-admin-card:hover{transform:translateY(-2px)}
.plat-admin-img{width:100%;height:130px;object-fit:cover}
.plat-admin-ph{width:100%;height:130px;background:linear-gradient(135deg,var(--bgd),var(--vp));display:flex;align-items:center;justify-content:center;font-size:32px}
.plat-admin-info{padding:12px}
.plat-admin-nom{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;margin-bottom:8px}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between}
.toggle-lbl{font-size:12px;color:var(--txl)}
.toggle{position:relative;width:42px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bgd);border-radius:11px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--vert)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
/* Calendrier */
.cal-semaine{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px}
.cal-jour{background:var(--wh);border-radius:12px;overflow:hidden;box-shadow:var(--sh);min-height:120px}
.cal-jour-header{background:var(--vert);color:#fff;padding:10px 12px;font-size:13px;font-weight:600}
.cal-jour-header span{font-size:11px;opacity:.7;display:block}
.cal-slot{padding:8px 10px;border-bottom:1px solid var(--bgd);font-size:12px;cursor:pointer;transition:background .15s}
.cal-slot:hover{background:var(--vp)}
.cal-slot:last-child{border-bottom:none}
.cal-slot-heure{font-weight:600;color:var(--vert);font-size:11px;margin-bottom:2px}
.cal-slot-client{font-weight:500;font-size:12px}
.cal-slot-salar{font-size:11px;color:var(--txl)}
.cal-slot.vide{color:var(--txl);font-style:italic;font-size:11px;padding:8px 10px}
.cal-mois{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-mois-header{text-align:center;font-size:11px;font-weight:600;color:var(--txl);text-transform:uppercase;padding:6px 0}
.cal-mois-day{background:var(--wh);border-radius:8px;min-height:80px;padding:6px;box-shadow:var(--sh)}
.cal-mois-day.autre-mois{opacity:.4}
.cal-mois-day.today{border:2px solid var(--vert)}
.cal-mois-num{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-mois-event{font-size:10px;background:var(--vp);color:var(--vert);border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-mois-event:hover{background:#c8e6c9}
/* Utils */
.lov{position:fixed;inset:0;background:rgba(255,255,255,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spin{width:34px;height:34px;border:3px solid var(--bgd);border-top-color:var(--vert);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:14px;color:var(--txl)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:999;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--vert)}
.empty{text-align:center;padding:40px;color:var(--txl);font-size:14px}
@media(max-width:768px){
  .main{padding:20px 16px}header{padding:0 16px}
  .cmd-card-top{grid-template-columns:1fr 1fr;gap:12px}
  .nav-tabs{width:100%}.ntab{flex:1;text-align:center;font-size:12px;padding:9px 8px}
  .plats-admin-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spin"></div><div class="ltxt" id="ltxt">Chargement...</div></div>
<div class="toast" id="toast"></div>
<div class="mbg" id="mbg" onclick="closeMod(event)">
  <div class="mbox"><div id="mcont"></div></div>
</div>

<!-- LOGIN -->
<div id="pLogin">
  <div class="lcard">
    <div class="llogo">Le Goût du Lien</div>
    <div class="ltag">Espace administration</div>
    <div class="fg"><label>Mot de passe admin</label><input type="password" id="iMdp" placeholder="••••••••"></div>
    <button class="btnLogin" onclick="login()">Accéder</button>
    <div class="lerr" id="lerr">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="pAdmin">
  <header>
    <div class="logo">Le Goût du Lien <span>Dashboard Admin</span></div>
    <button class="hbtn" onclick="logout()">Déconnexion</button>
  </header>
  <div class="main">
    <div class="nav-tabs">
      <button class="ntab on" onclick="chgPage('planning',this)">📋 Commandes</button>
      <button class="ntab" onclick="chgPage('calendrier',this)">📅 Calendrier</button>
      <button class="ntab" onclick="chgPage('plats',this)">🍽️ Plats</button>
    </div>

    <div id="np-planning" class="npage on">
      <div class="sem-nav">
        <label>Semaine :</label>
        <select class="sem-select" id="semSelect" onchange="chargerPlanning()"></select>
        <button class="hbtn" style="background:var(--vert);border-color:var(--vert)" onclick="chargerPlanning()">↺ Actualiser</button>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="stit">📋 Commandes & assignations</div>
      <div id="commandesDiv"></div>
    </div>

    <div id="np-calendrier" class="npage">
      <div class="sem-nav" style="margin-bottom:20px">
        <label>Mois :</label>
        <select class="sem-select" id="moisSelect" onchange="renderCalendrier()"></select>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <button onclick="setCalView('semaine')" id="btnSem" class="btn-assign" style="background:var(--vert)">Vue semaine</button>
        <button onclick="setCalView('mois')" id="btnMois" class="btn-assign" style="background:var(--bgd);color:var(--tx)">Vue mois</button>
      </div>
      <div id="calDiv"></div>
    </div>

    <div id="np-plats" class="npage">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div class="stit" style="margin-bottom:0">Activer / désactiver les plats du menu</div>
        <div style="font-size:13px;color:var(--txl)" id="platsCount"></div>
      </div>
      <div class="plats-admin-grid" id="platsGrid"></div>
    </div>
  </div>
</div>

<script>
const AK='patvhOGv8O9szhfm9.2b3cb31f20ecd6c0271669df216fa0224adc9b1e16c7f98ce6f5b14575a75905';
const BID='appTNygSM2x5VdNy6';
const AT=`https://api.airtable.com/v0/${BID}`;
const H={'Authorization':`Bearer ${AK}`,'Content-Type':'application/json'};
const ADMIN_PWD='legoutdulien2026';

let salaries=[],recettes=[],riRecs=[];

function showLoad(t){document.getElementById('lov').style.display='flex';document.getElementById('ltxt').textContent=t||'Chargement...'}
function hideLoad(){document.getElementById('lov').style.display='none'}
function showToast(m,t){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t||'');setTimeout(()=>{el.className='toast'},3000)}
function closeMod(e){if(e.target===document.getElementById('mbg'))document.getElementById('mbg').classList.remove('show')}

async function fetchAll(tbl,sort=''){
  let recs=[],offset=null;
  do{
    const url=`${AT}/${tbl}?pageSize=100`+(sort?'&'+sort:'')+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:H});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    recs=[...recs,...(d.records||[])];
    offset=d.offset||null;
  }while(offset);
  return recs;
}

function login(){
  const mdp=document.getElementById('iMdp').value.trim();
  if(mdp===ADMIN_PWD){
    sessionStorage.setItem('admin','1');
    document.getElementById('pLogin').style.display='none';
    document.getElementById('pAdmin').style.display='block';
    initAdmin();
  }else{
    document.getElementById('lerr').style.display='block';
  }
}
function logout(){sessionStorage.removeItem('admin');location.reload()}
function chgPage(p,btn){
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.npage').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  const page=document.getElementById('np-'+p);
  if(page)page.classList.add('on');
  if(p==='calendrier')setTimeout(()=>initCalendrier(),50);
}

function getLundis(){
  const res=[];
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const dow=(new Date(y,m,d)).getDay();
  const nextMon=dow===1?0:(8-dow)%7;
  for(let i=-4;i<8;i++){
    const l=new Date(y,m,d+nextMon+i*7);
    const yy=l.getFullYear(),mm=String(l.getMonth()+1).padStart(2,'0'),dd=String(l.getDate()).padStart(2,'0');
    res.push({id:`${yy}-${mm}-${dd}`,label:l.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})});
  }
  return res;
}

async function initAdmin(){
  showLoad('Initialisation...');
  const sel=document.getElementById('semSelect');
  const lundis=getLundis();
  lundis.forEach((s,i)=>{
    const opt=document.createElement('option');
    opt.value=s.id;opt.textContent='Semaine du '+s.label;
    if(i===4)opt.selected=true;
    sel.appendChild(opt);
  });
  // Charger données globales
  [salaries,recettes,riRecs]=await Promise.all([
    fetchAll('Salari%C3%A9s'),
    fetchAll('Recettes','sort%5B0%5D%5Bfield%5D=Nom+du+plat&sort%5B0%5D%5Bdirection%5D=asc'),
    fetchAll('Recettes_Ingr%C3%A9dients','sort%5B0%5D%5Bfield%5D=Ordre&sort%5B0%5D%5Bdirection%5D=asc')
  ]);
  hideLoad();
  await Promise.all([chargerPlanning(),chargerPlats()]);
}

function resolveNom(val){
  if(!val)return null;
  const v=Array.isArray(val)?val[0]:val;
  if(!v)return null;
  if(typeof v==='string'&&!v.startsWith('rec'))return v;
  return recettes.find(r=>r.id===v)?.fields['Nom du plat']||null;
}

async function chargerPlanning(){
  const semId=document.getElementById('semSelect').value;
  showLoad('Chargement...');
  try{
    const [commandes,clients]=await Promise.all([
      fetchAll('Commandes','sort%5B0%5D%5Bfield%5D=Cr%C3%A9neau&sort%5B0%5D%5Bdirection%5D=asc'),
      fetchAll('Clients')
    ]);
    const cmdSem=commandes.filter(c=>(c.fields['Semaine du']||'').includes(semId));

    // Stats
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card"><div class="stat-num">${cmdSem.length}</div><div class="stat-lbl">Commandes</div></div>
      <div class="stat-card"><div class="stat-num">${cmdSem.filter(c=>c.fields['Statut']==='Confirmée').length}</div><div class="stat-lbl">Confirmées</div></div>
      <div class="stat-card"><div class="stat-num">${cmdSem.filter(c=>c.fields['Statut']==='En attente de paiement').length}</div><div class="stat-lbl">En attente</div></div>
      <div class="stat-card"><div class="stat-num">${cmdSem.length*5}</div><div class="stat-lbl">Plats à préparer</div></div>`;

    if(cmdSem.length===0){
      document.getElementById('commandesDiv').innerHTML='<div class="empty">Aucune commande pour cette semaine.</div>';
      hideLoad();return;
    }

    const salarOptions=`<option value="">-- Non assigné --</option>`+
      salaries.map(s=>`<option value="${s.fields['Nom']||''}">${s.fields['Nom']||''}</option>`).join('');

    document.getElementById('commandesDiv').innerHTML=`<div class="cmd-cards">${cmdSem.map(cmd=>{
      const f=cmd.fields;
      const plats=[f['Plat 1'],f['Plat 2'],f['Plat 3'],f['Plat 4'],f['Plat 5']].map(resolveNom).filter(Boolean);
      // Trouver le client pour adresse et téléphone
      const clientLie=Array.isArray(f['Client lié'])?f['Client lié'][0]:f['Client lié'];
      const clientRec=clients.find(c=>c.id===clientLie);
      const cf=clientRec?clientRec.fields:{};
      const assigneActuel=f['Assigné à']||'';
      return`<div class="cmd-card" id="cmd-${cmd.id}">
        <div class="cmd-card-top">
          <div>
            <div class="cmd-label">Client</div>
            <div class="cmd-val">${f['Client']||'–'}</div>
            ${cf['Téléphone']?`<div class="cmd-val small">📞 ${cf['Téléphone']}</div>`:''}
            ${cf['Adresse']?`<div class="cmd-val small">📍 ${cf['Adresse']}</div>`:''}
          </div>
          <div>
            <div class="cmd-label">Créneau</div>
            <div class="cmd-val">${f['Créneau']||'–'}</div>
          </div>
          <div>
            <div class="cmd-label">Statut</div>
            <span class="badge ${f['Statut']==='Confirmée'?'ok':'wait'}">${f['Statut']==='Confirmée'?'✓ Confirmée':'⏳ En attente'}</span>
          </div>
          <div>
            <div class="cmd-label">Assigné à</div>
            <div class="cmd-val">${assigneActuel||'<span style="color:var(--txl)">Non assigné</span>'}</div>
          </div>
        </div>
        <div class="cmd-label" style="margin-bottom:6px">Plats (cliquez pour voir les ingrédients)</div>
        <div class="cmd-plats-tags">
          ${plats.map(p=>`<span class="ptag" onclick="voirIngredients('${p.replace(/'/g,"\\'")}',4)">${p}</span>`).join('')}
        </div>
        <div class="assign-row">
          <span class="assign-label">Assigner à :</span>
          <select class="assign-select" id="sel-${cmd.id}">
            ${salaries.map(s=>`<option value="${s.fields['Nom']||''}" ${assigneActuel===s.fields['Nom']?'selected':''}>${s.fields['Nom']||''}</option>`).join('')}
            <option value="" ${!assigneActuel?'selected':''}>-- Non assigné --</option>
          </select>
          <button class="btn-assign" onclick="assigner('${cmd.id}')">Enregistrer</button>
        </div>
      </div>`;
    }).join('')}</div>`;

  }catch(e){showToast('Erreur: '+e.message)}
  hideLoad();
}

async function assigner(cmdId){
  const sel=document.getElementById('sel-'+cmdId);
  const nom=sel.value;
  try{
    await fetch(`${AT}/Commandes/${cmdId}`,{
      method:'PATCH',headers:H,
      body:JSON.stringify({fields:{'Assigné à':nom||null}})
    });
    showToast(nom?`Assigné à ${nom} !`:'Assignation retirée','ok');
    // Mettre à jour l'affichage
    const card=document.getElementById('cmd-'+cmdId);
    const valEl=card.querySelector('.cmd-card-top > div:last-child .cmd-val');
    if(valEl)valEl.innerHTML=nom||'<span style="color:var(--txl)">Non assigné</span>';
  }catch(e){showToast('Erreur: '+e.message)}
}

async function voirIngredients(nomPlat,portions){
  document.getElementById('mcont').innerHTML='<div style="padding:30px;text-align:center"><div class="spin" style="margin:0 auto"></div></div>';
  document.getElementById('mbg').classList.add('show');
  const ings=riRecs.filter(r=>(r.fields['Nom ligne']||'').startsWith(nomPlat));
  const platRec=recettes.find(r=>r.fields['Nom du plat']===nomPlat);
  const pf=platRec?platRec.fields:{};

  // Charger le cache ingrédients pour les rayons
  const ingRecs=await fetchAll('Ingr%C3%A9dients');
  const ingCache={};
  ingRecs.forEach(r=>{const n=r.fields['Nom ingrédient']||'';if(n)ingCache[n]=r.fields['Rayon']||'Autres'});

  document.getElementById('mcont').innerHTML=`
    ${pf['Photo']&&pf['Photo'][0]?`<img src="${pf['Photo'][0].url}" style="width:100%;height:180px;object-fit:cover">`:
    `<div style="width:100%;height:180px;background:var(--bgd);display:flex;align-items:center;justify-content:center;font-size:40px">🍽️</div>`}
    <div class="mbody">
      <div class="mtit">${nomPlat}</div>
      <div style="font-size:12px;color:var(--txl);margin-bottom:12px">Quantités pour ${portions} portions</div>
      ${ings.length?`<ul class="ing-list">${ings.map(r=>{
        const f=r.fields;
        const nl=f['Nom ligne']||'';
        const ingNom=nl.includes(' - ')?nl.split(' - ').slice(1).join(' - '):'–';
        const qte=(f['Quantité par portion']||0)*portions;
        const uRaw=f['Unité par défaut'];
        const u=Array.isArray(uRaw)?uRaw[0]:(uRaw||'');
        const uFinal=u&&u!=='Unité par défaut'?u:'';
        const rayon=ingCache[ingNom]||'';
        return`<li>
          <span>${ingNom}${rayon?` <span style="font-size:10px;color:var(--txl)">(${rayon})</span>`:''}</span>
          <span class="ing-qte">${qte>0?(Number.isInteger(qte)?qte:qte.toFixed(2))+(uFinal?' '+uFinal:''):'–'}</span>
        </li>`;
      }).join('')}</ul>`:'<p style="color:var(--txl)">Ingrédients non disponibles.</p>'}
      <button class="mclose" onclick="document.getElementById('mbg').classList.remove('show')">Fermer</button>
    </div>`;
}

async function chargerPlats(){
  const grid=document.getElementById('platsGrid');
  grid.innerHTML='';
  const actifs=recettes.filter(r=>r.fields['Active ?']).length;
  document.getElementById('platsCount').textContent=`${actifs} plat${actifs>1?'s':''} actif${actifs>1?'s':''} cette semaine`;
  recettes.forEach(rec=>{
    const f=rec.fields;
    const nom=f['Nom du plat']||'';
    const actif=!!f['Active ?'];
    const img=f['Photo']&&f['Photo'][0]?f['Photo'][0].url:null;
    const card=document.createElement('div');
    card.className='plat-admin-card';
    card.style.opacity=actif?'1':'0.55';
    card.innerHTML=`
      ${img?`<img class="plat-admin-img" src="${img}" alt="${nom}">`:`<div class="plat-admin-ph">🍽️</div>`}
      <div class="plat-admin-info">
        <div class="plat-admin-nom">${nom}</div>
        <div class="toggle-wrap">
          <span class="toggle-lbl" id="lbl-${rec.id}">${actif?'<b style="color:var(--vert)">Actif</b>':'Inactif'}</span>
          <label class="toggle">
            <input type="checkbox" ${actif?'checked':''} onchange="togglePlat('${rec.id}',this.checked,this)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

async function togglePlat(id,actif,input){
  const card=input.closest('.plat-admin-card');
  input.disabled=true;
  try{
    await fetch(`${AT}/Recettes/${id}`,{method:'PATCH',headers:H,body:JSON.stringify({fields:{'Active ?':actif}})});
    card.style.opacity=actif?'1':'0.55';
    document.getElementById('lbl-'+id).innerHTML=actif?'<b style="color:var(--vert)">Actif</b>':'Inactif';
    const actifs=document.querySelectorAll('#platsGrid input:checked').length;
    document.getElementById('platsCount').textContent=`${actifs} plat${actifs>1?'s':''} actif${actifs>1?'s':''} cette semaine`;
    showToast(actif?'Plat activé !':'Plat désactivé','ok');
  }catch(e){input.checked=!actif;showToast('Erreur','err')}
  input.disabled=false;
}

// ===== CALENDRIER =====
let calView='semaine';
let allCommandes=[];

function setCalView(v){
  calView=v;
  document.getElementById('btnSem').style.background=v==='semaine'?'var(--vert)':'var(--bgd)';
  document.getElementById('btnSem').style.color=v==='semaine'?'#fff':'var(--tx)';
  document.getElementById('btnMois').style.background=v==='mois'?'var(--vert)':'var(--bgd)';
  document.getElementById('btnMois').style.color=v==='mois'?'#fff':'var(--tx)';
  renderCalendrier();
}

async function initCalendrier(){
  const sel=document.getElementById('moisSelect');
  if(!sel)return;
  sel.innerHTML='';
  const now=new Date();
  for(let i=-2;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const opt=document.createElement('option');
    opt.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    opt.textContent=d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    if(i===0)opt.selected=true;
    sel.appendChild(opt);
  }
  if(!allCommandes.length){
    allCommandes=await fetchAll('Commandes','sort%5B0%5D%5Bfield%5D=Cr%C3%A9neau&sort%5B0%5D%5Bdirection%5D=asc');
  }
  renderCalendrier();
}

function renderCalendrier(){
  if(!allCommandes.length)return;
  if(calView==='semaine')renderSemaine();
  else renderMois();
}

function renderSemaine(){
  const semId=document.getElementById('semSelect').value;
  const [y,m,d]=semId.split('-').map(Number);
  const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  const JMAP={Lundi:0,Mardi:1,Mercredi:2,Jeudi:3,Vendredi:4};
  const HEURES=['9h00 - 12h00','13h00 - 16h00'];

  const cmdSem=allCommandes.filter(c=>(c.fields['Semaine du']||'').includes(semId));

  const html=`<div class="cal-semaine">${JOURS.map(j=>{
    const jd=new Date(y,m-1,d+JMAP[j]);
    const jl=jd.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    return`<div class="cal-jour">
      <div class="cal-jour-header">${j}<span>${jd.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span></div>
      ${HEURES.map(h=>{
        const lbl=`${jl} · ${h}`;
        const cmd=cmdSem.find(c=>(c.fields['Créneau']||'').trim()===lbl.trim());
        if(cmd){
          return`<div class="cal-slot" onclick="voirIngredients('${(cmd.fields['Plat 1']&&!String(cmd.fields['Plat 1']).startsWith('[')?resolveNom(cmd.fields['Plat 1']):'').replace(/'/g,"\'")}',4)">
            <div class="cal-slot-heure">${h}</div>
            <div class="cal-slot-client">${cmd.fields['Client']||'Client'}</div>
            <div class="cal-slot-salar">${cmd.fields['Assigné à']||'Non assigné'}</div>
          </div>`;
        }
        return`<div class="cal-slot vide">${h}<br>Disponible</div>`;
      }).join('')}
    </div>`;
  }).join('')}</div>`;
  document.getElementById('calDiv').innerHTML=html;
}

function renderMois(){
  const val=document.getElementById('moisSelect').value;
  const [y,m]=val.split('-').map(Number);
  const premier=new Date(y,m-1,1);
  const dernier=new Date(y,m,0);
  const today=new Date();

  let dow=premier.getDay();
  if(dow===0)dow=7;
  const jours=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  let html=`<div class="cal-mois">`;
  jours.forEach(j=>{html+=`<div class="cal-mois-header">${j}</div>`});

  // Jours du mois précédent
  for(let i=1;i<dow;i++){
    html+=`<div class="cal-mois-day autre-mois"></div>`;
  }

  // Jours du mois
  for(let d=1;d<=dernier.getDate();d++){
    const dateStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===y&&today.getMonth()===m-1&&today.getDate()===d;
    const cmdsJour=allCommandes.filter(c=>{
      const cren=c.fields['Créneau']||'';
      const semaine=c.fields['Semaine du']||'';
      // Vérifier si ce jour est dans la semaine de cette commande
      if(!semaine)return false;
      const [sy,sm,sd]=semaine.split('-').map(Number);
      const lundiDate=new Date(sy,sm-1,sd);
      for(let i=0;i<5;i++){
        const jd=new Date(sy,sm-1,sd+i);
        if(jd.getFullYear()===y&&jd.getMonth()===m-1&&jd.getDate()===d){
          const jl=jd.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
          return cren.startsWith(jl);
        }
      }
      return false;
    });
    html+=`<div class="cal-mois-day ${isToday?'today':''}">
      <div class="cal-mois-num">${d}</div>
      ${cmdsJour.map(c=>`<div class="cal-mois-event" title="${c.fields['Client']||''} - ${c.fields['Créneau']||''}">${c.fields['Client']||'Client'}</div>`).join('')}
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('calDiv').innerHTML=html;
}
