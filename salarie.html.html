<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Goût du Lien – Mon planning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--vert:#3d6b4f;--vc:#5a8a6a;--vp:#eef4f0;--bg:#f8f4ee;--bgd:#ede7db;--tx:#2c2c2c;--txl:#6b6b6b;--wh:#fff;--sh:0 4px 24px rgba(0,0,0,.08);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:var(--vert);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff}
.logo span{font-size:12px;font-weight:400;opacity:.7;display:block;margin-top:-2px}
.hbtn{padding:7px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
#pLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg),var(--vp));padding:20px}
.lcard{background:var(--wh);border-radius:24px;padding:44px 36px;width:100%;max-width:400px;box-shadow:var(--sh);text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--vert);margin-bottom:4px}
.ltag{font-size:13px;color:var(--txl);margin-bottom:28px}
.fg{margin-bottom:14px;text-align:left}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--txl);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:12px 15px;border:1.5px solid var(--bgd);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg);outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--vert);background:var(--wh)}
.btnLogin{width:100%;padding:13px;background:var(--vert);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.btnLogin:hover{background:var(--vc)}
.lerr{background:#fdecea;color:#c62828;padding:10px;border-radius:9px;font-size:13px;margin-top:10px;display:none}
#pSalarie{display:none}
.main{padding:28px 24px;max-width:800px;margin:0 auto}
.welcome{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;margin-bottom:6px}
.welcome-sub{font-size:14px;color:var(--txl);margin-bottom:28px}
.sem-nav{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.sem-select{padding:9px 14px;border:1.5px solid var(--bgd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--wh);color:var(--tx);cursor:pointer;outline:none}
.sem-select:focus{border-color:var(--vert)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--wh);border-radius:var(--r);padding:16px;box-shadow:var(--sh);text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--vert)}
.stat-lbl{font-size:12px;color:var(--txl);margin-top:3px}
.stit{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:14px}
.mission-card{background:var(--wh);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:14px;border-left:4px solid var(--vert)}
.mission-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.mission-date{font-size:13px;font-weight:600;color:var(--vert);margin-bottom:2px}
.mission-creneau{font-size:14px;font-weight:600}
.client-info{background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.client-nom{font-size:15px;font-weight:600;margin-bottom:6px}
.client-detail{font-size:13px;color:var(--txl);display:flex;align-items:center;gap:6px;margin-bottom:3px}
.plats-section{margin-top:12px}
.plat-item{background:var(--bg);border-radius:10px;margin-bottom:8px;overflow:hidden}
.plat-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:14px;user-select:none}
.plat-header:hover{background:var(--bgd)}
.plat-arrow{transition:transform .2s;font-size:12px}
.plat-ings{display:none;padding:0 14px 12px}
.plat-ings.open{display:block}
.ing-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bgd);font-size:13px}
.ing-line:last-child{border-bottom:none}
.ing-qte{color:var(--txl);font-size:12px}
.empty{text-align:center;padding:48px;color:var(--txl)}
.empty-icon{font-size:48px;margin-bottom:12px}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.show{display:flex}
.mbox{background:var(--wh);border-radius:20px;max-width:460px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:24px}
.mclose{width:100%;padding:12px;background:var(--bgd);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:14px}
.lov{position:fixed;inset:0;background:rgba(255,255,255,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spin{width:34px;height:34px;border:3px solid var(--bgd);border-top-color:var(--vert);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:14px;color:var(--txl)}
@media(max-width:600px){
  .main{padding:20px 16px}header{padding:0 16px}
  .mission-header{flex-direction:column}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spin"></div><div class="ltxt">Chargement...</div></div>

<!-- LOGIN -->
<div id="pLogin">
  <div class="lcard">
    <div class="llogo">Le Goût du Lien</div>
    <div class="ltag">Espace salarié – Mon planning</div>
    <div class="fg"><label>Email</label><input type="email" id="iEmail" placeholder="votre@email.com"></div>
    <div class="fg"><label>Mot de passe</label><input type="password" id="iMdp" placeholder="••••••••"></div>
    <button class="btnLogin" onclick="login()">Accéder à mon planning</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- PLANNING -->
<div id="pSalarie">
  <header>
    <div class="logo">Le Goût du Lien <span>Mon planning</span></div>
    <button class="hbtn" onclick="logout()">Déconnexion</button>
  </header>
  <div class="main">
    <div class="welcome" id="welcomeTxt">Bonjour !</div>
    <div class="welcome-sub">Voici vos missions de la semaine</div>
    <div class="sem-nav">
      <select class="sem-select" id="semSelect" onchange="chargerMissions()"></select>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="stit">Mes missions</div>
    <div id="missionsDiv"></div>
  </div>
</div>

<script>
const AK='patvhOGv8O9szhfm9.2b3cb31f20ecd6c0271669df216fa0224adc9b1e16c7f98ce6f5b14575a75905';
const BID='appTNygSM2x5VdNy6';
const AT=`https://api.airtable.com/v0/${BID}`;
const H={'Authorization':`Bearer ${AK}`,'Content-Type':'application/json'};

let salarieRecord=null,recettes=[],riRecs=[];

function showLoad(){document.getElementById('lov').style.display='flex'}
function hideLoad(){document.getElementById('lov').style.display='none'}

async function fetchAll(tbl,sort=''){
  let recs=[],offset=null;
  do{
    const url=`${AT}/${tbl}?pageSize=100`+(sort?'&'+sort:'')+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:H});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    recs=[...recs,...(d.records||[])];
    offset=d.offset||null;
  }while(offset);
  return recs;
}

async function login(){
  const email=document.getElementById('iEmail').value.trim();
  const mdp=document.getElementById('iMdp').value.trim();
  const err=document.getElementById('lerr');
  err.style.display='none';
  if(!email||!mdp){err.textContent='Remplissez tous les champs.';err.style.display='block';return}
  showLoad();
  try{
    const recs=await fetchAll('Salari%C3%A9s');
    const found=recs.find(r=>(r.fields['Email']||r.fields['E-mail']||'').toLowerCase().trim()===email.toLowerCase()&&(r.fields['Mot de passe']||'').trim()===mdp);
    if(found){
      salarieRecord=found;
      sessionStorage.setItem('salarie',JSON.stringify(found));
      await initSalarie();
    }else{
      err.textContent='Email ou mot de passe incorrect.';err.style.display='block';
    }
  }catch(e){err.textContent='Erreur: '+e.message;err.style.display='block'}
  hideLoad();
}
function logout(){sessionStorage.removeItem('salarie');location.reload()}

function getLundis(){
  const res=[];
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const dow=(new Date(y,m,d)).getDay();
  const nextMon=dow===1?0:(8-dow)%7;
  for(let i=-2;i<6;i++){
    const l=new Date(y,m,d+nextMon+i*7);
    const yy=l.getFullYear(),mm=String(l.getMonth()+1).padStart(2,'0'),dd=String(l.getDate()).padStart(2,'0');
    res.push({id:`${yy}-${mm}-${dd}`,label:l.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})});
  }
  return res;
}

async function initSalarie(){
  const prenom=(salarieRecord.fields['Nom']||'').split(' ')[0];
  document.getElementById('welcomeTxt').textContent='Bonjour '+prenom+' !';
  const sel=document.getElementById('semSelect');
  const lundis=getLundis();
  lundis.forEach((s,i)=>{
    const opt=document.createElement('option');
    opt.value=s.id;opt.textContent='Semaine du '+s.label;
    if(i===2)opt.selected=true;
    sel.appendChild(opt);
  });
  document.getElementById('pLogin').style.display='none';
  document.getElementById('pSalarie').style.display='block';
  showLoad();
  [recettes,riRecs]=await Promise.all([
    fetchAll('Recettes'),
    fetchAll('Recettes_Ingr%C3%A9dients','sort%5B0%5D%5Bfield%5D=Ordre&sort%5B0%5D%5Bdirection%5D=asc')
  ]);
  hideLoad();
  await chargerMissions();
}

function resolveNom(val){
  if(!val)return null;
  const v=Array.isArray(val)?val[0]:val;
  if(!v)return null;
  if(typeof v==='string'&&!v.startsWith('rec'))return v;
  return recettes.find(r=>r.id===v)?.fields['Nom du plat']||null;
}

async function chargerMissions(){
  const semId=document.getElementById('semSelect').value;
  showLoad();
  try{
    const [commandes,clients,ingRecs]=await Promise.all([
      fetchAll('Commandes','sort%5B0%5D%5Bfield%5D=Cr%C3%A9neau&sort%5B0%5D%5Bdirection%5D=asc'),
      fetchAll('Clients'),
      fetchAll('Ingr%C3%A9dients')
    ]);

    const nomSalarie=salarieRecord.fields['Nom']||'';
    const ingCache={};
    ingRecs.forEach(r=>{const n=r.fields['Nom ingrédient']||'';if(n)ingCache[n]=r.fields['Rayon']||''});

    // Filtrer mes missions
    const mesMissions=commandes.filter(c=>{
      const semOk=(c.fields['Semaine du']||'').includes(semId);
      const assignOk=(c.fields['Assigné à']||'').trim()===nomSalarie.trim();
      return semOk&&assignOk;
    });

    // Stats
    document.getElementById('statsRow').innerHTML=`
      <div class="stat-card"><div class="stat-num">${mesMissions.length}</div><div class="stat-lbl">Mission${mesMissions.length>1?'s':''}</div></div>
      <div class="stat-card"><div class="stat-num">${mesMissions.length*5}</div><div class="stat-lbl">Plats à préparer</div></div>`;

    if(mesMissions.length===0){
      document.getElementById('missionsDiv').innerHTML=`<div class="empty"><div class="empty-icon">🗓️</div><p>Aucune mission assignée pour cette semaine.</p></div>`;
      hideLoad();return;
    }

    document.getElementById('missionsDiv').innerHTML=mesMissions.map((cmd,mIdx)=>{
      const f=cmd.fields;
      const plats=[f['Plat 1'],f['Plat 2'],f['Plat 3'],f['Plat 4'],f['Plat 5']].map(resolveNom).filter(Boolean);
      const clientLie=Array.isArray(f['Client lié'])?f['Client lié'][0]:f['Client lié'];
      const clientRec=clients.find(c=>c.id===clientLie);
      const cf=clientRec?clientRec.fields:{};
      const crenParts=(f['Créneau']||'').split('·');
      const crenJour=crenParts[0]||'';
      const crenHeure=crenParts[1]||'';

      return`<div class="mission-card">
        <div class="mission-header">
          <div>
            <div class="mission-date">${crenJour.trim()}</div>
            <div class="mission-creneau">🕐 ${crenHeure.trim()}</div>
          </div>
          <span style="background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500">${f['Statut']==='Confirmée'?'✓ Confirmée':'⏳ En attente'}</span>
        </div>
        <div class="client-info">
          <div class="client-nom">👤 ${f['Client']||'–'}</div>
          ${cf['Téléphone']?`<div class="client-detail">📞 <a href="tel:${cf['Téléphone']}" style="color:var(--vert)">${cf['Téléphone']}</a></div>`:''}
          ${cf['Adresse']?`<div class="client-detail">📍 <a href="https://maps.google.com?q=${encodeURIComponent(cf['Adresse'])}" target="_blank" style="color:var(--vert)">${cf['Adresse']}</a></div>`:''}
        </div>
        <div class="plats-section">
          <div style="font-size:12px;color:var(--txl);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Plats à préparer (4 portions chacun)</div>
          ${plats.map((p,pIdx)=>{
            const ings=riRecs.filter(r=>(r.fields['Nom ligne']||'').startsWith(p));
            return`<div class="plat-item">
              <div class="plat-header" onclick="toggleIng('ing-${mIdx}-${pIdx}',this)">
                <span>🍽️ ${p}</span>
                <span class="plat-arrow" id="arr-${mIdx}-${pIdx}">▼</span>
              </div>
              <div class="plat-ings" id="ing-${mIdx}-${pIdx}">
                ${ings.map(r=>{
                  const nl=r.fields['Nom ligne']||'';
                  const ingNom=nl.includes(' - ')?nl.split(' - ').slice(1).join(' - '):'–';
                  const qte=(r.fields['Quantité par portion']||0)*4;
                  const uRaw=r.fields['Unité par défaut'];
                  const u=Array.isArray(uRaw)?uRaw[0]:(uRaw||'');
                  const uFinal=u&&u!=='Unité par défaut'?u:'';
                  const rayon=ingCache[ingNom]||'';
                  return`<div class="ing-line">
                    <span>${ingNom}${rayon?` <span style="font-size:10px;color:var(--txl)">(${rayon})</span>`:''}</span>
                    <span class="ing-qte">${qte>0?(Number.isInteger(qte)?qte:qte.toFixed(2))+(uFinal?' '+uFinal:''):'–'}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('missionsDiv').innerHTML=`<p style="color:red;padding:20px">Erreur: ${e.message}</p>`}
  hideLoad();
}

function toggleIng(id,header){
  const div=document.getElementById(id);
  const arr=header.querySelector('.plat-arrow');
  const open=div.classList.toggle('open');
  arr.textContent=open?'▲':'▼';
}

document.getElementById('iEmail').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
document.getElementById('iMdp').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
const sc=sessionStorage.getItem('salarie');
if(sc){salarieRecord=JSON.parse(sc);initSalarie()}
else document.getElementById('pLogin').style.display='flex';
</script>
</body>
</html>
