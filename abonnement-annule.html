<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement annulé · Mon espace Batchcooking</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f6f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#18180f}
.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08);border:1px solid #e2e1d8}
.icon{font-size:64px;margin-bottom:18px}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;margin-bottom:12px;color:#8a6a1a}
p{font-size:15px;line-height:1.6;color:#4a4a3a;margin-bottom:14px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏸️</div>
  <h1>Paiement non finalisé</h1>
  <p>Tu as quitté le paiement avant de l'avoir terminé. Ton compte n'est pas activé.</p>
  <p style="font-size:13px;color:#8a8a72">Pour réessayer, demande à ta cuisinière de te renvoyer le lien de paiement, ou contacte-la.</p>
</div>
</body>
</html>
